<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do's</title>
</head>
<body>
    <main id="todo-app">
        <h1 id="title">To-Do's 📜</h1>
        <div id="input-container">
            <input type="text" placeholder="Add your task" name="input" id="input">
            <button id="btn-add"><span style="font-size:1.3em;">&#10010;</span></span></button>
        </div>
        <div id="tasks"></div>
        <button id="btn-clear">Clear All</button>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
